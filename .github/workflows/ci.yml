name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hire
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: hire_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hire -d hire_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: golangci/golangci-lint-action@v6

      - name: Run tests
        env:
          DATABASE_URL: postgres://hire:testpass@localhost:5432/hire_test?sslmode=disable
        run: go test -p 1 ./internal/... -v

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci
      - run: npm run lint
      - run: npm run build
